<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kalkulator Pupuk Kabupaten - Dark Mode</title>
<script src="https://unpkg.com/lucide@latest"></script>

<style>
* {
    font-family: "Times New Roman", Times, serif;
    box-sizing: border-box;
}

body {
    background: #121212; 
    color: #e0e0e0;
    margin: 0;
    padding: 20px 0;
}

.container {
    max-width: 420px; 
    margin: auto; 
    padding: 15px;
}

.card {
    background: #1e1e1e; 
    padding: 25px; 
    border-radius: 20px; 
    box-shadow: 0 10px 40px rgba(0,0,0,0.7);
    border: 1px solid #333;
}

h2 {
    text-align: center; 
    color: #4ade80; 
    margin-bottom: 5px;
    font-size: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
}

h3 {
    text-align: center; 
    font-size: 14px; 
    color: #bbb; 
    font-weight: normal;
    margin-top: 0;
    margin-bottom: 25px;
}

.input-group {
    margin-bottom: 18px;
}

label {
    font-weight: bold;
    font-size: 14px;
    color: #cfcfcf;
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
}

/* Ukuran ikon di label */
label i {
    width: 16px;
    color: #4ade80;
}

input, select {
    width: 100%; 
    padding: 12px 15px; 
    border-radius: 12px; 
    border: 1px solid #444;
    background-color: #2a2a2a;
    color: #fff;
    font-size: 15px;
    transition: all 0.3s;
}

input:focus, select:focus {
    border-color: #4ade80;
    outline: none;
    box-shadow: 0 0 8px rgba(74, 222, 128, 0.2);
    background-color: #333;
}

button {
    width: 100%; 
    padding: 14px; 
    border: none; 
    border-radius: 12px; 
    margin-top: 12px; 
    font-size: 16px; 
    font-weight: bold;
    cursor: pointer;
    font-family: Arial, sans-serif; 
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: all 0.2s;
}

button i {
    width: 20px;
}

button:active {
    transform: scale(0.96);
}

.hitung {
    background: #105e8f;
    color: #ffffff;
    box-shadow: 0 4px 15px rgba(22, 101, 52, 0.4);
}

.hitung:hover {
    filter: brightness(1.2);
}

.wa {
    background: #1a8f45; /* Warna WA asli lebih segar */
    color: #ffffff;
    font-weight: 800;
    box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3);
}

.wa:hover {
    background: #20ba5a;
}

.hasil {
    margin-top: 25px; 
    padding: 18px; 
    background: #000;
    color: #e0e0e0;
    border-radius: 15px; 
    border: 1px solid #4ade80;
    line-height: 1.6;
    font-size: 15px;
}

.footer {
    text-align: center;
    font-size: 12px;
    color: #666;
    margin-top: 30px;
    padding-bottom: 20px;
    font-family: Arial, sans-serif;
}

input[type="date"]::-webkit-calendar-picker-indicator {
    filter: invert(1);
    cursor: pointer;
}
</style>
</head>

<body>

<div class="container">
    <div class="card">

        <h2><i data-lucide="sprout"></i> Kalkulator Pupuk</h2>
        <h3>Sesuai Rekomendasi ERDKK Nasional</h3>

        <div class="input-group">
            <label><i data-lucide="map-pin"></i> Kecamatan</label>
            <select id="kecamatan">
                <option value="BOLA">BOLA</option>
                <option value="TAKKALALLA">TAKKALALLA</option>
                <option value="PENRANG">PENRANG</option>
                <option value="SAJOANGING">SAJOANGING</option>
                <option value="PAMMANA">PAMMANA</option>
                <option value="SABANGPARU">SABANGPARU</option>
                <option value="TANASITOLO">TANASITOLO</option>
                <option value="TEMPE">TEMPE</option>
                <option value="MANIANGPAJO">MANIANGPAJO</option>
                <option value="BELAWA">BELAWA</option>
                <option value="PITUMPANUA">PITUMPANUA</option>
                <option value="KEERA">KEERA</option>
                <option value="MAJAULENG">MAJAULENG</option>
                <option value="GILIRENG">GILIRENG</option>
            </select>
        </div>

        <div class="input-group">
            <label><i data-lucide="maximize"></i> Luas Lahan (ha)</label>
            <input type="number" id="luas" placeholder="Contoh: 1.65" step="0.01" min="0">
        </div>

        <div class="input-group">
            <label><i data-lucide="mountain"></i> Jenis Lahan</label>
            <select id="lahan">
                <option value="lembah">Lembah</option>
                <option value="bukit">Bukit</option>
                <option value="rawa">Rawa</option>
            </select>
        </div>

        <div class="input-group">
            <label><i data-lucide="calendar"></i> Tanggal Tanam</label>
            <input type="date" id="tanggal">
        </div>

        <button class="hitung" onclick="hitung()">
            <i data-lucide="calculator"></i> Hitung Dosis Pemupukan
        </button>
        <button class="wa" onclick="kirimWA()">
            <i data-lucide="message-circle"></i> Kirim ke WhatsApp Anda
        </button>

        <div class="hasil" id="hasil" style="display:none;"></div>

    </div>
</div>

<div class="footer">
    Dibuat oleh King Mamank - PPL Bola
</div>

<script>
// Inisialisasi ikon Lucide
lucide.createIcons();

let hasilWA = "";

const data = {
    BOLA:{urea:175, phonska:375, organik:1000},
    TAKKALALLA:{urea:150, phonska:300, organik:1000},
    PENRANG:{urea:200, phonska:300, organik:1000},
    SAJOANGING:{urea:200, phonska:300, organik:1000},
    PAMMANA:{urea:200, phonska:300, organik:1000},
    SABANGPARU:{urea:200, phonska:300, organik:500},
    TANASITOLO:{urea:200, phonska:300, organik:500},
    TEMPE:{urea:200, phonska:300, organik:1000},
    MANIANGPAJO:{urea:200, phonska:300, organik:500},
    BELAWA:{urea:225, phonska:250, organik:500},
    PITUMPANUA:{urea:250, phonska:300, organik:500},
    KEERA:{urea:250, phonska:300, organik:1000},
    MAJAULENG:{urea:200, phonska:300, organik:500},
    GILIRENG:{urea:200, phonska:300, organik:1000}
};

function faktor(lahan, nilai){
    if(lahan === "lembah") return nilai * 0.9;
    if(lahan === "rawa") return nilai * 0.8;
    return nilai; 
}

function sak(kg){
    return Math.round(kg / 25) / 2;
}

function tambahHari(tgl,hari){
    let t=new Date(tgl);
    t.setDate(t.getDate()+hari);
    return t.toLocaleDateString("id-ID", { day: 'numeric', month: 'long', year: 'numeric' });
}

function hitung(){
    let kec=document.getElementById("kecamatan").value;
    let luas=document.getElementById("luas").value;
    let lahan=document.getElementById("lahan").value;
    let tanggal=document.getElementById("tanggal").value;

    if(!luas||!tanggal){alert("Mohon isi luas lahan dan tanggal tanam!");return;}

    let d=data[kec];

    let u1=luas*faktor(lahan,d.urea*0.57);
    let u2=luas*faktor(lahan,d.urea*0.43);

    let p1=luas*faktor(lahan,d.phonska*0.4);
    let p2=luas*faktor(lahan,d.phonska*0.3);
    let p3=luas*faktor(lahan,d.phonska*0.3);

    let org=luas*faktor(lahan,d.organik);

    let t1=tambahHari(tanggal,7);
    let t2=tambahHari(tanggal,30);
    let t3=tambahHari(tanggal,40);

    let hasilHTML=`
    <div style="border-bottom: 1px solid #4ade80; margin-bottom: 12px; padding-bottom: 8px;">
    <b style="color:#4ade80">📍 Hasil Kecamatan: ${kec}</b>
    </div>
    🌱 <b>Pupuk Organik (Dasar)</b><br>
    Dosis: ${org.toFixed(0)} kg (${sak(org)} sak)<br><br>

    🌿 <b>Pemupukan I (${t1})</b><br>
    Urea: ${u1.toFixed(0)} kg (${sak(u1)} sak)<br>
    Phonska: ${p1.toFixed(0)} kg (${sak(p1)} sak)<br><br>

    🌾 <b>Pemupukan II (${t2})</b><br>
    Urea: ${u2.toFixed(0)} kg (${sak(u2)} sak)<br>
    Phonska: ${p2.toFixed(0)} kg (${sak(p2)} sak)<br><br>

    🌾 <b>Pemupukan III (${t3})</b><br>
    Phonska: ${p3.toFixed(0)} kg (${sak(p3)} sak)
    `;

    hasilWA = `*REKOMENDASI DOSIS PUPUK*\n` +
              `Kecamatan: ${kec}\n\n` +
              `🌱 *Organik (Dasar)*: ${org.toFixed(0)} kg (${sak(org)} sak)\n\n` +
              `🌱 *Pupuk I (${t1})*\n` +
              `- Urea: ${u1.toFixed(0)} kg\n` +
              `- Phonska: ${p1.toFixed(0)} kg\n\n` +
              `🌾 *Pupuk II (${t2})*\n` +
              `- Urea: ${u2.toFixed(0)} kg\n` +
              `- Phonska: ${p2.toFixed(0)} kg\n\n` +
              `🌿 *Pupuk III (${t3})*\n` +
              `- Phonska: ${p3.toFixed(0)} kg\n\n` +
              `_Dihitung via Kalkulator PPL Bola_`;

    let div=document.getElementById("hasil");
    div.style.display="block";
    div.innerHTML=hasilHTML;
    div.scrollIntoView({ behavior: 'smooth' });
}

function kirimWA(){
    if(!hasilWA){alert("Silakan hitung dosis dulu!");return;}
    window.open("https://wa.me/?text="+encodeURIComponent(hasilWA));
}
</script>
</body>
</html>
